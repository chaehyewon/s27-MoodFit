# MoodFit CI/CD: GitHub push → Oracle OCI 자동 배포
#
# 작동 흐름:
#   main 브랜치에 push
#   → GitHub Actions 실행
#   → SSH로 Oracle 서버 접속
#   → /home/ubuntu/moodfit 에서 최신 코드 반영
#   → .env에 GEMINI_API_KEY 갱신
#   → docker compose 새 이미지 빌드 및 컨테이너 재기동
#   → s27-demo.aiweb2026.site 즉시 반영
#
# 필요한 GitHub Secrets:
#   SSH_HOST       = Oracle Public IP
#   SSH_USER       = ubuntu
#   SSH_KEY        = Oracle SSH private key
#   GEMINI_API_KEY = Google Gemini API key

name: Deploy MoodFit to Oracle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 1. 리포 체크아웃
        uses: actions/checkout@v4

      - name: 2. 커밋 정보 표시
        run: |
          echo "🚀 배포 커밋: ${{ github.sha }}"
          echo "👤 트리거 사용자: ${{ github.actor }}"
          echo "📝 메시지: ${{ github.event.head_commit.message }}"

      - name: 3. Oracle 서버에 SSH 접속하여 MoodFit 배포
        uses: appleboy/ssh-action@v1
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          envs: REPO_URL,GEMINI_API_KEY
          script: |
            set -e
            echo "▶ MoodFit 배포 시작: $(date)"
            cd /home/ubuntu/moodfit

            if [ ! -d .git ]; then
              echo "▶ .git 없음 — 첫 배포로 판단하여 git init + remote 등록"
              git init
              git remote add origin "$REPO_URL"
            fi

            echo "▶ 최신 코드 pull"
            git fetch origin main
            git reset --hard origin/main

            echo "▶ .env 갱신"
            echo "GEMINI_API_KEY=$GEMINI_API_KEY" > .env
            chmod 600 .env

            echo "▶ 새 이미지 빌드 + MoodFit 컨테이너 재기동"
            docker compose up -d --build

            echo "▶ 헬스체크 대기 (최대 60초)"
            for i in {1..12}; do
              if curl -fsS -o /dev/null http://127.0.0.1:7861/; then
                echo "✅ MoodFit 컨테이너 응답 확인"
                break
              fi
              echo "  ... 대기 중 ($i/12)"
              sleep 5
            done

            echo "▶ 최종 상태"
            docker ps --filter "name=moodfit" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "✅ MoodFit 배포 완료: $(date)"

      - name: 4. 배포 실패 시 안내
        if: failure()
        run: |
          echo "❌ MoodFit 배포 실패. Oracle 서버에 SSH 접속해서 로그 확인:"
          echo "  ssh ubuntu@${{ secrets.SSH_HOST }}"
          echo "  cd /home/ubuntu/moodfit"
          echo "  docker compose logs --tail=100 moodfit"
