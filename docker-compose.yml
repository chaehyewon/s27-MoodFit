# 6주차 칼로리카운터 → Oracle E2.1.Micro 운영용 compose
# 9주차 수업 자산. SSH로 Oracle 인스턴스 들어간 후 이 파일 한 장으로 운영.
#
# 운영 명령:
#   docker compose up -d --build      # 첫 빌드 + 백그라운드 기동
#   docker compose logs -f            # 실시간 로그
#   docker compose ps                 # 상태 확인
#   docker compose down               # 정지·제거
#   git pull && docker compose up -d --build   # 코드 갱신 후 재배포

services:
  moodfit:
    build: .
    image: moodfit:latest
    container_name: moodfit
    restart: unless-stopped

    ports:
      - "7861:7860"

    env_file:
      - .env

    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

    mem_limit: 500m
    memswap_limit: 1500m
    deploy:
      resources:
        limits:
          memory: 500M

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/').read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
