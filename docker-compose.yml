# MoodFit — Oracle OCI 운영용 Docker Compose
#
# 운영 명령:
# docker compose up -d --build                # 첫 빌드 + 백그라운드 실행
# docker compose logs -f                      # 실시간 로그 확인
# docker compose ps                           # 컨테이너 상태 확인
# docker compose down                         # 컨테이너 중지 및 제거
# git pull && docker compose up -d --build    # 코드 갱신 후 재배포

services:
  moodfit:
    build: .
    image: moodfit:latest
    container_name: moodfit
    restart: unless-stopped

    ports:
      - "7861:7860"

    env_file:
      - .env

    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

    mem_limit: 500m
    memswap_limit: 1500m
    deploy:
      resources:
        limits:
          memory: 500M

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860/').read()",
        ]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
